<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="css/FinalGrade.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css">
    <link rel="stylesheet" type="text/css" href="css/animate.css">
    <script src="script/FinalGrade.js"></script>
    <title>Tính Điểm Tổng Kết</title>
    <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:700" rel="stylesheet">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Tính điểm tổng kết môn PTIT" />
    <meta name="keywords" content=""/>

    <meta name="robots" content="index, follow" />
</head>
<body>

    <div class="card animated fadeIn">
        <div class="name">
            Tính Điểm Tổng Kết
        </div>
        <br>
        <div id="container1">
            <select id="weight" onchange="changeTheWeight()">
                <option value="" disabled selected>Chọn trọng số</option>
                <option value="0">10-20-20-50</option>
                <option value="1">10-10-30-50</option>
                <option value="2">10-10-20-60</option>
                <option value="3">10-10-10-70</option>
                <option value="4">10-30-60</option>
                <option value="5">10-20-70</option>
                <option value="6">10-10-80</option>
            </select>
        </div>
        <br>
        <table id="gradeTable">
            <tr>
                <th></th>
            </tr>
            <tr>
                <td></td>
            </tr>
        </table>
        <br>
        
        <div id="container2">
            <div id="toggleText" onclick="toggleTable()">Bảng quy đổi</div>
            <br>
            <table id="exchangeTable">
                <tr>
                    <th>Hệ 10</th>
                    <th>Hệ 4</th>
                    <th>Điểm chữ</th>
                </tr>
                <tr>
                    <td>8.95 - 10.0 </td>
                    <td>4.0</td>
                    <td>A+</td>
                </tr>
                <tr>
                    <td>8.45 - 8.94</td>
                    <td>3.7</td>
                    <td>A &nbsp;</td>
                </tr>
                <tr>
                    <td>7.95 - 8.44</td>
                    <td>3.5</td>
                    <td>B+</td>
                </tr>
                <tr>
                    <td>6.95 - 7.94</td>
                    <td>3.0</td>
                    <td>B &nbsp;</td>
                </tr>
                <tr>
                    <td>6.45 - 6.94</td>
                    <td>2.5</td>
                    <td>C+</td>
                </tr>
                <tr>
                    <td>5.45 - 6.44</td>
                    <td>2.0</td>
                    <td>C &nbsp;</td>
                </tr>
                <tr>
                    <td>4.95 - 5.44</td>
                    <td>1.5</td>
                    <td>D+</td>
                </tr>
                <tr>
                    <td>3.95 - 4.94</td>
                    <td>1.0</td>
                    <td>D &nbsp;</td>
                </tr>
                <tr>
                    <td>0 - 3.94</td>
                    <td>0.0</td>
                    <td>F &nbsp;</td>
                </tr>
            </table>
        </div>
        
        <br>
    </div>
    <!--footer-->
    <br>
    <footer class="animated fadeIn">
        &copy; 2024. nducmd.
    </footer>
</body>
</html>

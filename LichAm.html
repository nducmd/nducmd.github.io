<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="css/LichAm.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css">
    <link rel="stylesheet" type="text/css" href="css/animate.css">
    <script src="script/LichAm.js"></script>
    <title>Lịch Âm</title>
    <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:700" rel="stylesheet">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Xem lịch âm. Nguồn: Ho Ngoc Duc" />
    <meta name="keywords" content=""/>

    <meta name="robots" content="index, follow" />
</head>
<body>

    <div class="card animated fadeIn">
        <div class="name">
            Lịch Âm
        </div>
        <br>
        <script>
            document.writeln(printSelectedMonth());
        </script>
        <br>
        <form name="SelectMonth" action="">
            <div id="container2">
                <div id="container1">
                    Th&aacute;ng
                    <select name="month">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select> &#160;&#160;
                    N&#x103;m 
                    <select name="year" id="year-select"></select>
                </div>
                <button type="button" onclick="javascript:viewMonth(parseInt(month.value), parseInt(year.value));">Xem l&#x1ECB;ch th&aacute;ng</button>
                <button type="button" onclick="javascript:viewYear(parseInt(year.value));">Xem l&#x1ECB;ch n&#x0103;m</button>
                <br>
            </div>
        </form>
        <script>
            getSelectedMonth();
            var yearSelect = document.getElementById('year-select');
            for (let i = currentYear - 100; i <= currentYear+100; i++) {
                var option = document.createElement('option');
                option.value = i;
                option.text = i;
                yearSelect.add(option);
            }
            document.SelectMonth.month.value = currentMonth;
            document.SelectMonth.year.value = currentYear;

            function viewMonth(mm, yy) {
                //window.location = window.location.pathname + '?yy='+yy+'&mm='+mm;
                window.location.href = window.location.pathname + '?yy='+yy+'&mm='+mm;
            }
            function viewYear(yy) {
                var loc = 'https://www.informatik.uni-leipzig.de/~duc/amlich/JavaScript/currentyear.html?yy='+yy;
                var win2702 = window.open(loc, "win2702", "menubar=yes,scrollbars=yes,resizable=yes");
            }
        </script>
    </div>
    <br> <br>
    
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" type="text/css" href="css/LichAm.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="css/font-awesome.css">
    <link rel="stylesheet" type="text/css" href="css/animate.css">
    <script src="script/LichAm.js"></script>
    <title>Lịch Âm</title>
    <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:700" rel="stylesheet">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Xem lịch âm. Nguồn: Ho Ngoc Duc" />
    <meta name="keywords" content=""/>
    <meta name="author" content="nducmd">
    <meta name="robots" content="index, follow" />
</head>
<body>

    <div class="card animated fadeIn">
        <div class="name">
            Lịch Âm
        </div>
        <div id="container2">
            <div class="todayStr" id="solarDay"></div>
            <div class="todayStr" id="lunarDay"></div>
        </div>
        <form name="SelectMonth" action="">
            <div id="container2">
                <div id="container1">
                    <label for="month-select">Tháng</label>
                    <select name="month" id="month-select" onchange="viewMonth(parseInt(month.value), parseInt(year.value))">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select> &#160;&#160;
                    <label for="year-select">Năm</label>
                    <select name="year" id="year-select" onchange="viewMonth(parseInt(month.value), parseInt(year.value))"></select>
                    <button type="button" onclick="viewYear(parseInt(year.value));"> ↗</button>
                </div>
            </div>
        </form>
        <script>
            document.writeln(printSelectedMonth());
        </script>
        <br>
        <script>
            getSelectedMonth();
            var yearSelect = document.getElementById('year-select');
            for (let i = currentYear - 100; i <= currentYear+100; i++) {
                var option = document.createElement('option');
                option.value = i;
                option.text = i;
                yearSelect.add(option);
            }
            document.SelectMonth.month.value = currentMonth;
            document.SelectMonth.year.value = currentYear;
            var todayString  = getTodayString().split("-+-");
            var solarDay = document.getElementById("solarDay");
            solarDay.innerHTML = todayString[0].trim();
            var lunarDay = document.getElementById("lunarDay");
            lunarDay.innerHTML = todayString[1].trim();
            function viewMonth(mm, yy) {
                //window.location = window.location.pathname + '?yy='+yy+'&mm='+mm;
                window.location.href = window.location.pathname + '?yy='+yy+'&mm='+mm;
            }
            function viewYear(yy) {
                var loc = 'LichAmNam.html?yy=' + yy;
                var nducmd = window.open(loc, "nducmd", "menubar=yes,scrollbars=yes,resizable=yes");
            }
    
        </script>
    </div>
    <br> <br>
    
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="css/GPA.css">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" type="text/css" href="css/font-awesome.css">
  <link rel="stylesheet" type="text/css" href="css/animate.css">
  <script src="script/GPA.js"></script>
  <title>Tính GPA</title>
  <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700" rel="stylesheet">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="" />
  <meta name="keywords" content=""/>
  <meta name="author" content="nducmd">
  <meta name="robots" content="index, follow" />
</head>
<body>

  <div class="card animated fadeIn">
    <div class="name">
      Tính GPA
    </div>
    <span style="font-size: 20px; margin-left: 15px;">Note:</span> <br>
    <span class="note"> <strong>1. </strong> Hệ thống sử dụng cho PTIT</span> <br>
    <span class="note"> <strong>2. </strong> Tên môn học có thể để trống</span> <br>
    <br>
    <form>
    <input type="text" class = "pad" id="courseName" placeholder="Tên môn học">

    <select id="credits" class = "pad" onchange="changeTheColorOfButton()">
      <option value="" disabled selected>Số tín chỉ</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>

    <select id="grade" class = "pad" onchange="changeTheColorOfButton()">
      <option value="" disabled selected>Điểm</option>
      <option value="A+">A+</option>
      <option value="A">A</option>
      <option value="B+">B+</option>
      <option value="B">B</option>
      <option value="C+">C+</option>
      <option value="C">C</option>
      <option value="D+">D+</option>
      <option value="D">D</option>
      <option value="F">F</option>
    </select>
    <br>
    <button id="buttonAdd" type="button" onclick="addCourse()"><i class="fa fa-plus-circle"></i></button>
    <br>
  </form>
  <table id="courseList">
    <thead>
      <tr>
        <th>Tên Môn</th>
        <th>Số Tín Chỉ</th>
        <th>Điểm</th>
        <th>Tùy Chọn</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
  <br>
  <div id="gpa"></div>
</div>
<!--footer-->
  <br>
  <footer class="animated fadeIn">
      &copy; 2024. nducmd.
  </footer>
</body>
</html>

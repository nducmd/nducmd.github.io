<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="css/gpa.css">
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" type="text/css" href="css/font-awesome.css">
  <link rel="stylesheet" type="text/css" href="css/animate.css">
  <script src="gpa.js"></script>
  <title>GPA Calculator</title>
  <link rel="shortcut icon" href="img/fav.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:700" rel="stylesheet">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="" />
  <meta name="keywords" content=" "/>
  <meta name="author" content="nducmd">
  <meta name="robots" content="index, follow" />
</head>
<body>

  <div class="card animated fadeIn">
    <div class="name">
      GPA Calculator
   </div>
   <span style="font-size: 12px; margin-left: 15px;">Note:</span> <br>
   <span class="note"> <strong>1. </strong> This grading system is used at PTIT</span> <br>
   <span class="note"> <strong>2. </strong> Fill in the CREDITS and LETTER GRADE</span> <br>
   <span class="note"> <strong>3. </strong> Optionally, you can also provide the course names</span> <br>
   <span class="note"> <strong>4. </strong> Click on the Add(+) button to add course</span> <br>
   <span class="note"> <strong>5. </strong> Your GPA will be automatically calculated.</span>
   <br>
   <br>
   <form>
    <input type="text" id="courseName" placeholder="Course Title">
 
    <select id="credits" onchange="changeTheColorOfButton()">
      <option value="" disabled selected>Credits</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  
    <select id="grade" onchange="changeTheColorOfButton()">
      <option value="" disabled selected>Letter grade</option>
      <option value="A+">A+</option>
      <option value="A">A</option>
      <option value="B+">B+</option>
      <option value="B">B</option>
      <option value="C+">C+</option>
      <option value="C">C</option>
      <option value="D+">D+</option>
      <option value="D">D</option>
      <option value="F">F</option>
    </select>
    <br>
    <button id="buttonAdd" type="button" onclick="addCourse()"><i class="fa fa-plus-circle"></i></button>
    <br>
  </form>
  <table id="courseList">
    <thead>
      <tr>
        <th>Course Title</th>
        <th>Credits</th>
        <th>Letter grade</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
  <br>
  <div id="gpa"></div>
</div>

</body>
</html>
